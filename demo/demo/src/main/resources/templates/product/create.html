<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Add Product</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            padding: 40px;
        }

        .container {
            max-width: 650px;
            margin: auto;
        }

        .card {
            background: #1e293b;
            padding: 40px;
            border-radius: 14px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
        }

        h1 {
            margin-bottom: 30px;
            font-size: 26px;
        }

        .form-group {
            margin-bottom: 22px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #94a3b8;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            font-size: 14px;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #f97316;
        }

        .error-message {
            color: #f87171;
            font-size: 13px;
            margin-top: 4px;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background: #f97316;
            color: white;
        }

        .btn-primary:hover {
            background: #ea580c;
        }

        .btn-secondary {
            background: #475569;
            color: white;
        }

        .btn-secondary:hover {
            background: #334155;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="card">

            <h1>Add New Product</h1>

            <form th:action="@{/products/create}" th:object="${product}" method="post" enctype="multipart/form-data">

                <div class="form-group">
                    <label>Name</label>
                    <input type="text" th:field="*{name}">
                    <span class="error-message" th:errors="*{name}"></span>
                </div>

                <div class="form-group">
                    <label>Price</label>
                    <input type="number" th:field="*{price}">
                    <span class="error-message" th:errors="*{price}"></span>
                </div>

                <div class="form-group">
                    <label>Category</label>

                    <select name="category">
                        <option value="">Select category</option>

                        <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}">
                        </option>

                    </select>

                </div>

                <div class="form-group">
                    <label>Image</label>
                    <input type="file" name="imageProduct" accept="image/*">
                </div>

                <div class="button-group">
                    <button type="submit" class="btn btn-primary">Add Product</button>
                    <a href="/products" class="btn btn-secondary">Cancel</a>
                </div>

            </form>

        </div>
    </div>

</body>

</html>
